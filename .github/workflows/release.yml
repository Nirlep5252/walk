name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Materialize Azure Trusted Signing metadata
        if: ${{ secrets.WINDOWS_AZURE_TRUSTED_SIGN_FILE_B64 != '' }}
        id: trusted-signing
        shell: pwsh
        run: |
          $metadataPath = Join-Path $env:RUNNER_TEMP "trusted-signing-metadata.json"
          [System.IO.File]::WriteAllBytes(
            $metadataPath,
            [Convert]::FromBase64String("${{ secrets.WINDOWS_AZURE_TRUSTED_SIGN_FILE_B64 }}"))
          "metadata_path=$metadataPath" >> $env:GITHUB_OUTPUT

      - name: Azure login for Trusted Signing
        if: ${{ steps.trusted-signing.outputs.metadata_path != '' && secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Publish release packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VELOPACK_AZURE_TRUSTED_SIGN_FILE: ${{ steps.trusted-signing.outputs.metadata_path }}
          VELOPACK_SIGN_PARAMS: ${{ secrets.WINDOWS_SIGN_PARAMS }}
          VELOPACK_SIGN_TEMPLATE: ${{ secrets.WINDOWS_SIGN_TEMPLATE }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $releaseNotes = "docs/releases/$version.md"
          if (-not (Test-Path $releaseNotes -PathType Leaf)) {
            throw "Missing release notes file: $releaseNotes"
          }

          ./scripts/Publish-WindowsRelease.ps1 -Version $version -ReleaseNotesPath $releaseNotes -UploadToGitHub -PublishRelease
