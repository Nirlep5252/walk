name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Publish release packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $releaseNotes = "docs/releases/$version.md"
          if (-not (Test-Path $releaseNotes -PathType Leaf)) {
            throw "Missing release notes file: $releaseNotes"
          }

          ./scripts/Publish-WindowsRelease.ps1 -Version $version -ReleaseNotesPath $releaseNotes -UploadToGitHub -PublishRelease
